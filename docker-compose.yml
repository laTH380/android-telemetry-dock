services:
  android-telemetry-dock:
    build: .
    container_name: android-telemetry-dock
    restart: unless-stopped
    # host network lets the container see the same LAN/ADB endpoints as the PC.
    network_mode: host
    environment:
      ATD_CONFIG: /config/config.yaml
    volumes:
      - ./data:/data
      - ./config.yaml:/config/config.yaml:ro
      - ./adbkey:/root/.android/adbkey
      - ./adbkey.pub:/root/.android/adbkey.pub
